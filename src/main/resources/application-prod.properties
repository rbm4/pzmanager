rcon.ip=72.62.137.60

# AWS EC2 Proxy
aws.proxy.enabled=true

proxy.reconcile.enabled=true

# Boot sequence
server.boot.sequence.enabled=true

server.map.folder=/home/pzuser/Zomboid/Saves/Multiplayer/servertest/map

# Server wipe
server.save.path=/home/pzuser/Zomboid/Saves

# ── Memory optimization ───────────────────────────────────────────
# Close Hibernate session at service layer, not end of HTTP request
spring.jpa.open-in-view=false

# Reduce Hibernate query plan caches (default 2048 per EntityManagerFactory × 3 = 6144)
spring.jpa.properties.hibernate.query.plan_cache_max_size=64
spring.jpa.properties.hibernate.query.plan_parameter_metadata_max_size=16

# Tomcat thread pool — small community behind Nginx, no need for 200 threads (~1 MB stack each)
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=2

# Backup Database Configuration (Read-Only) - old save for migration
backup.datasource.enabled=true
backup.datasource.url=jdbc:sqlite:/home/pzuser/manager_cars.db
backup.datasource.driver-class-name=org.sqlite.JDBC
