<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Mapa de Regiões - Apocalipse [BR]</title>
    <style>
        :root {
            --bg: #0b0f14;
            --text: #e6eef9;
            --muted: #9fb1c6;
            --border: #203044;
            --accent: #e74c3c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font: 14px/1.35 system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Noto Sans", "Helvetica Neue", Arial;
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; cursor: grab; }
        canvas:active { cursor: grabbing; }

        .topBar {
            position: absolute;
            left: 12px; top: 12px; right: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        .topBar > * { pointer-events: auto; }

        .hud {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            background: rgba(10, 17, 26, 0.88);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 14px;
        }
        .hud .kv { color: var(--muted); font-size: 12px; }
        .hud .kv b { color: var(--text); font-weight: 600; }

        button {
            background: rgba(10, 17, 26, 0.9);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 13px;
        }
        button:hover { border-color: #2f4a68; }

        .legend {
            position: absolute;
            right: 12px; bottom: 12px;
            width: 260px;
            background: rgba(10, 17, 26, 0.92);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 14px;
            z-index: 10;
        }
        .legend h3 { margin: 0 0 8px 0; font-size: 13px; color: #d8e6ff; }

        .legRow {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 5px 0;
            line-height: 1.25;
        }
        .legBox {
            width: 14px; height: 14px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.2);
            flex: 0 0 auto;
        }
        .legTxt { color: var(--muted); font-size: 12px; }

        #tooltipBox {
            position: fixed;
            z-index: 9999;
            display: none;
            max-width: 360px;
            background: rgba(10, 17, 26, 0.96);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            color: var(--text);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-size: 12px;
            line-height: 1.4;
        }

        .backBtn {
            background: rgba(231,76,60,0.12);
            border-color: rgba(231,76,60,0.45);
            color: #f0a0a0;
        }
        .backBtn:hover { border-color: #e74c3c; color: #fff; }

        @media (max-width: 640px) {
            .legend { display: none; }
            .topBar { flex-wrap: wrap; }
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>

    <div class="topBar">
        <div class="hud">
            <div class="kv">Zoom: <b id="hudZoom">0.080</b></div>
            <div class="kv">Centro: <b id="hudCenter">9000,8000</b></div>
            <div class="kv"><b>Arraste</b> para mover, <b>Scroll</b> para zoom</div>
        </div>
        <div class="hud">
            <button id="btnReset">Resetar vista</button>
            <button class="backBtn" id="btnBack">✕ Fechar</button>
        </div>
    </div>

    <div class="legend" id="legend">
        <h3>Legenda</h3>
        <div class="legRow">
            <div class="legBox" style="background:transparent; border:2px solid rgba(200,130,255,0.65)"></div>
            <div class="legTxt">Região PVE</div>
        </div>
        <div class="legRow">
            <div class="legBox" style="background:transparent; border:2px solid rgba(231,76,60,0.75)"></div>
            <div class="legTxt">Região PVP ☠️</div>
        </div>
        <div class="legRow">
            <div class="legBox" style="background:transparent; border:2px solid rgba(80,200,120,0.65)"></div>
            <div class="legTxt">Região permanente</div>
        </div>
    </div>

    <div id="tooltipBox"></div>

    <script>
        const $ = (id) => document.getElementById(id);
        function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
        function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

        /* ---------- Canvas / Camera ---------- */
        const canvas = $("c");
        const ctx = canvas.getContext("2d");
        let W = 0, H = 0, dpr = 1;
        let camX = 9000, camY = 8000;
        let zoom = 0.08;
        let isPanning = false, panStart = null;
        let lastMouseWorld = null;

        function resize() {
            dpr = window.devicePixelRatio || 1;
            W = canvas.clientWidth; H = canvas.clientHeight;
            canvas.width = Math.floor(W * dpr); canvas.height = Math.floor(H * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            draw();
        }
        window.addEventListener("resize", resize);

        function worldToScreen(x, y) { return { x: (x - camX) * zoom + W / 2, y: (y - camY) * zoom + H / 2 }; }
        function screenToWorld(x, y) { return { x: (x - W / 2) / zoom + camX, y: (y - H / 2) / zoom + camY }; }

        function setZoom(newZoom, anchorScreen) {
            const a = anchorScreen || { x: W / 2, y: H / 2 };
            const before = screenToWorld(a.x, a.y);
            zoom = clamp(newZoom, 0.01, 2.5);
            const after = screenToWorld(a.x, a.y);
            camX += (before.x - after.x);
            camY += (before.y - after.y);
        }

        /* ---------- Basemap ---------- */
        let mapImg = null, mapImgReady = false;
        const LOCK_TR = { x: 19796, y: 4 };
        const LOCK_BL = { x: 0, y: 15899 };

        (function loadMapImage() {
            mapImg = new Image();
            mapImg.onload = () => { mapImgReady = true; draw(); };
            mapImg.onerror = () => { draw(); };
            mapImg.src = "/map.jpg?cachebust=" + Date.now();
        })();

        /* ---------- Data ---------- */
        let regions = [];
        let hoveredRegion = null;

        /* ---------- Region color helper ---------- */
        function regionColor(rg) {
            const cats = (rg.categories || "").toLowerCase();
            if (cats.includes("pvp")) return { stroke: "rgba(231,76,60,0.75)", fill: "rgba(231,76,60,0.06)", label: "#e74c3c" };
            if (rg.permanent) return { stroke: "rgba(80,200,120,0.65)", fill: "rgba(80,200,120,0.06)", label: "#50c878" };
            return { stroke: "rgba(200,130,255,0.65)", fill: "rgba(200,130,255,0.06)", label: "#c882ff" };
        }

        /* ---------- Drawing ---------- */
        function draw() {
            ctx.clearRect(0, 0, W, H);

            // basemap
            if (mapImgReady) {
                const pTL = worldToScreen(LOCK_BL.x, LOCK_TR.y);
                const pBR = worldToScreen(LOCK_TR.x, LOCK_BL.y);
                ctx.globalAlpha = 0.9;
                ctx.drawImage(mapImg, pTL.x, pTL.y, (pBR.x - pTL.x), (pBR.y - pTL.y));
                ctx.globalAlpha = 1.0;
            }

            // grid
            ctx.strokeStyle = "rgba(255,255,255,0.04)";
            ctx.lineWidth = 1;
            const gridSize = 300;
            const topLeft = screenToWorld(0, 0);
            const botRight = screenToWorld(W, H);
            const gx0 = Math.floor(topLeft.x / gridSize) * gridSize;
            const gy0 = Math.floor(topLeft.y / gridSize) * gridSize;
            const gx1 = Math.ceil(botRight.x / gridSize) * gridSize;
            const gy1 = Math.ceil(botRight.y / gridSize) * gridSize;

            for (let x = gx0; x <= gx1; x += gridSize) {
                const p1 = worldToScreen(x, topLeft.y);
                const p2 = worldToScreen(x, botRight.y);
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            }
            for (let y = gy0; y <= gy1; y += gridSize) {
                const p1 = worldToScreen(topLeft.x, y);
                const p2 = worldToScreen(botRight.x, y);
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            }

            // regions
            hoveredRegion = null;
            if (regions.length) {
                // hover detection
                if (lastMouseWorld) {
                    for (const rg of regions) {
                        const rx1 = Math.min(rg.x1, rg.x2), ry1 = Math.min(rg.y1, rg.y2);
                        const rx2 = Math.max(rg.x1, rg.x2), ry2 = Math.max(rg.y1, rg.y2);
                        if (lastMouseWorld.x >= rx1 && lastMouseWorld.x <= rx2 &&
                            lastMouseWorld.y >= ry1 && lastMouseWorld.y <= ry2) {
                            hoveredRegion = rg; break;
                        }
                    }
                }

                for (const rg of regions) {
                    const rx1 = Math.min(rg.x1, rg.x2), ry1 = Math.min(rg.y1, rg.y2);
                    const rx2 = Math.max(rg.x1, rg.x2), ry2 = Math.max(rg.y1, rg.y2);
                    const tl = worldToScreen(rx1, ry1);
                    const br = worldToScreen(rx2, ry2);
                    const sw = br.x - tl.x, sh = br.y - tl.y;
                    const c = regionColor(rg);

                    // fill
                    ctx.fillStyle = hoveredRegion === rg ? c.fill.replace(/[\d.]+\)$/, "0.14)") : c.fill;
                    ctx.fillRect(tl.x, tl.y, sw, sh);

                    // border
                    ctx.strokeStyle = c.stroke;
                    ctx.setLineDash([]);
                    ctx.lineWidth = hoveredRegion === rg ? 3 : 2;
                    ctx.strokeRect(tl.x, tl.y, sw, sh);

                    // label
                    if (sw > 50) {
                        const cats = (rg.categories || "").toLowerCase();
                        const isPvp = cats.includes("pvp");
                        const label = (rg.name || rg.code) + (isPvp ? " ☠️" : "");
                        ctx.font = sw > 120 ? "bold 13px sans-serif" : "11px sans-serif";
                        ctx.fillStyle = c.label;
                        ctx.fillText(label, tl.x + 5, tl.y + 16);
                    }
                }
            }

            // HUD
            $("hudZoom").textContent = zoom.toFixed(3);
            $("hudCenter").textContent = `${Math.round(camX)},${Math.round(camY)}`;
        }

        /* ---------- Pointer events ---------- */
        canvas.addEventListener("contextmenu", (e) => e.preventDefault());

        canvas.addEventListener("mousedown", (e) => {
            const r = canvas.getBoundingClientRect();
            const sx = e.clientX - r.left, sy = e.clientY - r.top;
            lastMouseWorld = screenToWorld(sx, sy);
            isPanning = true;
            panStart = { sx, sy, camX, camY };
        });

        canvas.addEventListener("mousemove", (e) => {
            const r = canvas.getBoundingClientRect();
            const sx = e.clientX - r.left, sy = e.clientY - r.top;
            lastMouseWorld = screenToWorld(sx, sy);

            if (isPanning && panStart) {
                camX = panStart.camX - (sx - panStart.sx) / zoom;
                camY = panStart.camY - (sy - panStart.sy) / zoom;
                draw();
            } else {
                draw();
                if (hoveredRegion) {
                    const rg = hoveredRegion;
                    const cats = (rg.categories || "").toLowerCase();
                    const isPvp = cats.includes("pvp");
                    const tip = `<b style="font-size:14px">${escapeHtml(rg.name || rg.code)}</b>${isPvp ? ' <span style="color:#e74c3c">☠️ PVP</span>' : ' <span style="color:#c882ff">PVE</span>'}<br>
<span style="color:#888">Código:</span> ${escapeHtml(rg.code || "")}<br>
${rg.categories ? '<span style="color:#888">Categorias:</span> ' + escapeHtml(rg.categories) + '<br>' : ''}
<span style="color:#888">Coordenadas:</span> (${rg.x1}, ${rg.y1}) → (${rg.x2}, ${rg.y2})
${rg.permanent ? '<br><span style="color:#50c878"><b>⚡ Permanente</b></span>' : ''}`;
                    showTooltipAt(e.clientX + 16, e.clientY + 16, tip);
                } else {
                    hideTooltip();
                }
            }
        });

        canvas.addEventListener("mouseup", () => {
            isPanning = false;
            panStart = null;
        });

        canvas.addEventListener("wheel", (e) => {
            e.preventDefault();
            const r = canvas.getBoundingClientRect();
            const sx = e.clientX - r.left, sy = e.clientY - r.top;
            const factor = Math.exp(-e.deltaY * 0.0012);
            setZoom(zoom * factor, { x: sx, y: sy });
            draw();
        }, { passive: false });

        /* ---------- Touch support ---------- */
        let lastTouches = null;

        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            if (e.touches.length === 1) {
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                const sx = t.clientX - r.left, sy = t.clientY - r.top;
                lastMouseWorld = screenToWorld(sx, sy);
                isPanning = true;
                panStart = { sx, sy, camX, camY };
            }
            lastTouches = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));
        }, { passive: false });

        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            const touches = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));

            if (touches.length === 1 && isPanning && panStart) {
                const r = canvas.getBoundingClientRect();
                const sx = touches[0].x - r.left, sy = touches[0].y - r.top;
                camX = panStart.camX - (sx - panStart.sx) / zoom;
                camY = panStart.camY - (sy - panStart.sy) / zoom;
                draw();
            } else if (touches.length === 2 && lastTouches && lastTouches.length === 2) {
                // pinch zoom
                const prevDist = Math.hypot(lastTouches[1].x - lastTouches[0].x, lastTouches[1].y - lastTouches[0].y);
                const curDist = Math.hypot(touches[1].x - touches[0].x, touches[1].y - touches[0].y);
                if (prevDist > 0) {
                    const mid = { x: (touches[0].x + touches[1].x) / 2, y: (touches[0].y + touches[1].y) / 2 };
                    const r = canvas.getBoundingClientRect();
                    setZoom(zoom * (curDist / prevDist), { x: mid.x - r.left, y: mid.y - r.top });
                    draw();
                }
            }
            lastTouches = touches;
        }, { passive: false });

        canvas.addEventListener("touchend", (e) => {
            if (e.touches.length === 0) {
                isPanning = false;
                panStart = null;
            }
            lastTouches = e.touches.length ? Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY })) : null;
        });

        /* ---------- Tooltip ---------- */
        function showTooltipAt(px, py, html) {
            const box = $("tooltipBox");
            box.innerHTML = html;
            box.style.display = "block";
            const pad = 10;
            box.style.left = "0px"; box.style.top = "0px";
            const r = box.getBoundingClientRect();
            let x = px, y = py;
            if (x + r.width > window.innerWidth - pad) x = window.innerWidth - pad - r.width;
            if (y + r.height > window.innerHeight - pad) y = window.innerHeight - pad - r.height;
            x = Math.max(pad, x); y = Math.max(pad, y);
            box.style.left = x + "px"; box.style.top = y + "px";
        }
        function hideTooltip() { $("tooltipBox").style.display = "none"; }
        document.addEventListener("click", () => hideTooltip());

        /* ---------- Load regions ---------- */
        async function loadRegions() {
            try {
                const resp = await fetch("/map-regions/api/regions");
                if (!resp.ok) return;
                regions = await resp.json();
                draw();
            } catch (e) { /* silent */ }
        }

        /* ---------- UI ---------- */
        $("btnReset").onclick = () => { camX = 9000; camY = 8000; zoom = 0.08; draw(); };
        $("btnBack").onclick = () => {
            if (window.parent !== window) {
                window.parent.postMessage("closeMapRegions", "*");
            } else {
                history.back();
            }
        };

        /* ---------- Init ---------- */
        resize();
        draw();
        loadRegions();
    </script>
</body>

</html>
