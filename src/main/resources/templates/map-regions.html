<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Mapa de Regiões - Apocalipse [BR]</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: #000; overflow: hidden; }
        iframe { display: block; width: 100%; height: 100%; border: none; }

        .closeBar {
            position: absolute;
            top: 8px; right: 12px;
            z-index: 100;
            pointer-events: auto;
        }
        .closeBtn {
            background: rgba(231,76,60,0.15);
            color: #f0a0a0;
            border: 1px solid rgba(231,76,60,0.45);
            border-radius: 12px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
            font-family: system-ui, sans-serif;
        }
        .closeBtn:hover { border-color: #e74c3c; color: #fff; }
    </style>
</head>

<body>
    <iframe id="mapFrame" src="/pzmap/pzmap.html" allowfullscreen></iframe>
    <div class="closeBar">
        <button class="closeBtn" id="btnBack">✕ Fechar</button>
    </div>
    <script>
        document.getElementById('btnBack').onclick = () => {
            if (window.parent !== window) {
                window.parent.postMessage('closeMapRegions', '*');
            } else {
                history.back();
            }
        };
    </script>
</body>

</html>
