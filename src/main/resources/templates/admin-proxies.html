<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Proxies - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            margin-left: 280px;
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .page-header h1 {
            background: linear-gradient(45deg, #ff6b6b, #ee5a6f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Alert */
        .alert {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .alert.success { background: rgba(76,175,80,0.2); border: 1px solid #4caf50; color: #4caf50; }
        .alert.error   { background: rgba(244,67,54,0.2); border: 1px solid #f44336; color: #f44336; }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: rgba(76,175,80,0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
        }
        .btn-primary:hover { background: rgba(76,175,80,0.3); }
        .btn-edit {
            background: rgba(255,193,7,0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }
        .btn-edit:hover { background: rgba(255,193,7,0.3); }
        .btn-delete {
            background: rgba(244,67,54,0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }
        .btn-delete:hover { background: rgba(244,67,54,0.3); }
        .btn-toggle {
            background: rgba(33,150,243,0.2);
            color: #2196f3;
            border: 1px solid #2196f3;
        }
        .btn-toggle:hover { background: rgba(33,150,243,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Table */
        .proxies-table {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .table-header, .proxy-row {
            display: grid;
            grid-template-columns: 60px 1fr 1fr 1fr 1fr 90px 80px 80px 160px;
            gap: 10px;
            padding: 12px 16px;
            align-items: center;
            font-size: 0.9rem;
        }

        .table-header {
            background: rgba(255, 255, 255, 0.1);
            font-weight: 600;
            color: #ff6b6b;
        }

        .proxy-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.3s ease;
        }
        .proxy-row:hover { background: rgba(255, 255, 255, 0.05); }
        .proxy-row:last-child { border-bottom: none; }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
            display: inline-block;
        }
        .status-badge.enabled  { background: rgba(76,175,80,0.2); border: 1px solid #4caf50; color: #4caf50; }
        .status-badge.disabled { background: rgba(244,67,54,0.2); border: 1px solid #f44336; color: #f44336; }

        .provider-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.1);
            color: #aaa;
        }

        .cell-truncate {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .actions-cell {
            display: flex;
            gap: 6px;
        }

        .actions-cell .btn {
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: #1e2a3a;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 30px;
            width: 500px;
            max-width: 95vw;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #ff6b6b;
        }

        .form-group select option {
            background: #1e2a3a;
            color: #fff;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 24px;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.1);
            color: #aaa;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-cancel:hover { background: rgba(255,255,255,0.2); }

        .btn-save {
            background: rgba(76,175,80,0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
            padding: 10px 24px;
        }
        .btn-save:hover { background: rgba(76,175,80,0.3); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        .empty-state p { margin-top: 10px; }

        @media (max-width: 1100px) {
            .table-header, .proxy-row {
                grid-template-columns: 50px 1fr 1fr 1fr 80px 80px 140px;
            }
            .col-region, .col-dns { display: none; }
        }

        @media (max-width: 768px) {
            .container { margin-left: 0; padding: 15px; }
            body { flex-direction: column; }
            .table-header, .proxy-row {
                grid-template-columns: 1fr 1fr 80px 120px;
                font-size: 0.85rem;
            }
            .col-instance, .col-provider, .col-region, .col-dns, .col-port { display: none; }
        }
    </style>
</head>
<body>
<div th:replace="~{header-component :: header}"></div>
<div th:replace="~{sidebar-component :: sidebar}"></div>

<div class="container">
    <div class="page-header">
        <h1>🌐 Gerenciar Proxies</h1>
        <button class="btn btn-primary" onclick="openCreateModal()">+ Novo Proxy</button>
    </div>

    <div id="alert" class="alert"></div>

    <div class="proxies-table">
        <div class="table-header">
            <div>ID</div>
            <div>Proxy ID / Nome</div>
            <div class="col-instance">Instance ID</div>
            <div class="col-provider">Provider</div>
            <div class="col-region">Região</div>
            <div class="col-dns">DNS Subdomain</div>
            <div class="col-port">Porta</div>
            <div>Status</div>
            <div>Ações</div>
        </div>
        <div id="proxyRows"></div>
    </div>
</div>

<!-- Create / Edit Modal -->
<div class="modal-overlay" id="proxyModal" onclick="if(event.target===this) closeModal()">
    <div class="modal">
        <h2 id="modalTitle">Novo Proxy</h2>
        <form id="proxyForm" onsubmit="return saveProxy(event)">
            <input type="hidden" id="editId">

            <div class="form-group">
                <label for="proxyId">Proxy ID *</label>
                <input type="text" id="proxyId" placeholder="ex: br-south" required>
            </div>

            <div class="form-group">
                <label for="displayName">Nome de Exibição *</label>
                <input type="text" id="displayName" placeholder="ex: SP1" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="providerType">Provider</label>
                    <select id="providerType">
                        <option value="AWS_EC2">AWS EC2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="providerRegion">Região</label>
                    <input type="text" id="providerRegion" placeholder="sa-east-1" value="sa-east-1">
                </div>
            </div>

            <div class="form-group">
                <label for="instanceId">Instance ID *</label>
                <input type="text" id="instanceId" placeholder="ex: i-0abc123def456" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="dnsSubdomain">DNS Subdomain *</label>
                    <input type="text" id="dnsSubdomain" placeholder="ex: proxy-sp" required>
                </div>
                <div class="form-group">
                    <label for="port">Porta</label>
                    <input type="number" id="port" value="16261" min="1" max="65535">
                </div>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="enabled" checked style="margin-right: 8px;">
                    Habilitado
                </label>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
                <button type="submit" class="btn btn-save" id="btnSave">Salvar</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API = '/api/admin/proxies';

    function showAlert(msg, type) {
        const el = document.getElementById('alert');
        el.textContent = msg;
        el.className = 'alert ' + type;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 5000);
    }

    function escHtml(str) {
        if (!str) return '';
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    async function loadProxies() {
        try {
            const res = await fetch(API);
            if (!res.ok) throw new Error('Failed to load');
            const proxies = await res.json();
            renderTable(proxies);
        } catch (e) {
            showAlert('Erro ao carregar proxies: ' + e.message, 'error');
        }
    }

    function renderTable(proxies) {
        const container = document.getElementById('proxyRows');
        if (!proxies.length) {
            container.innerHTML = '<div class="empty-state"><p>🔌 Nenhum proxy cadastrado</p><p>Clique em "+ Novo Proxy" para adicionar</p></div>';
            return;
        }

        container.innerHTML = proxies.map(p => `
            <div class="proxy-row">
                <div>${p.id}</div>
                <div class="cell-truncate" title="${escHtml(p.proxyId)}">
                    <strong>${escHtml(p.displayName)}</strong><br>
                    <span style="color:#aaa;font-size:0.8rem">${escHtml(p.proxyId)}</span>
                </div>
                <div class="cell-truncate col-instance" title="${escHtml(p.instanceId)}">${escHtml(p.instanceId)}</div>
                <div class="col-provider"><span class="provider-badge">${escHtml(p.providerType)}</span></div>
                <div class="col-region">${escHtml(p.providerRegion)}</div>
                <div class="col-dns cell-truncate" title="${escHtml(p.dnsSubdomain)}">${escHtml(p.dnsSubdomain)}</div>
                <div class="col-port">${p.port}</div>
                <div>
                    <span class="status-badge ${p.enabled ? 'enabled' : 'disabled'}">
                        ${p.enabled ? 'Ativo' : 'Inativo'}
                    </span>
                </div>
                <div class="actions-cell">
                    <button class="btn btn-toggle" onclick="toggleEnabled(${p.id}, ${!p.enabled})" title="${p.enabled ? 'Desativar' : 'Ativar'}">
                        ${p.enabled ? '⏸️' : '▶️'}
                    </button>
                    <button class="btn btn-edit" onclick='openEditModal(${JSON.stringify(p)})' title="Editar">✏️</button>
                    <button class="btn btn-delete" onclick="deleteProxy(${p.id}, '${escHtml(p.proxyId)}')" title="Excluir">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    // Modal
    function openCreateModal() {
        document.getElementById('modalTitle').textContent = 'Novo Proxy';
        document.getElementById('editId').value = '';
        document.getElementById('proxyId').value = '';
        document.getElementById('proxyId').disabled = false;
        document.getElementById('displayName').value = '';
        document.getElementById('providerType').value = 'AWS_EC2';
        document.getElementById('providerRegion').value = 'sa-east-1';
        document.getElementById('instanceId').value = '';
        document.getElementById('dnsSubdomain').value = '';
        document.getElementById('port').value = '16261';
        document.getElementById('enabled').checked = true;
        document.getElementById('proxyModal').classList.add('active');
    }

    function openEditModal(proxy) {
        document.getElementById('modalTitle').textContent = 'Editar Proxy — ' + proxy.displayName;
        document.getElementById('editId').value = proxy.id;
        document.getElementById('proxyId').value = proxy.proxyId;
        document.getElementById('proxyId').disabled = true;
        document.getElementById('displayName').value = proxy.displayName;
        document.getElementById('providerType').value = proxy.providerType;
        document.getElementById('providerRegion').value = proxy.providerRegion || 'sa-east-1';
        document.getElementById('instanceId').value = proxy.instanceId;
        document.getElementById('dnsSubdomain').value = proxy.dnsSubdomain;
        document.getElementById('port').value = proxy.port || 16261;
        document.getElementById('enabled').checked = proxy.enabled;
        document.getElementById('proxyModal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('proxyModal').classList.remove('active');
    }

    async function saveProxy(e) {
        e.preventDefault();
        const editId = document.getElementById('editId').value;
        const isEdit = !!editId;

        const body = {
            proxyId: document.getElementById('proxyId').value.trim(),
            displayName: document.getElementById('displayName').value.trim(),
            providerType: document.getElementById('providerType').value,
            providerRegion: document.getElementById('providerRegion').value.trim(),
            instanceId: document.getElementById('instanceId').value.trim(),
            dnsSubdomain: document.getElementById('dnsSubdomain').value.trim(),
            port: parseInt(document.getElementById('port').value) || 16261,
            enabled: document.getElementById('enabled').checked
        };

        const btnSave = document.getElementById('btnSave');
        btnSave.disabled = true;
        btnSave.textContent = 'Salvando...';

        try {
            const url = isEdit ? API + '/' + editId : API;
            const method = isEdit ? 'PUT' : 'POST';

            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const data = await res.json();
            if (!res.ok) {
                throw new Error(data.error || 'Erro ao salvar');
            }

            closeModal();
            showAlert(isEdit ? 'Proxy atualizado com sucesso!' : 'Proxy criado com sucesso!', 'success');
            loadProxies();
        } catch (err) {
            showAlert('Erro: ' + err.message, 'error');
        } finally {
            btnSave.disabled = false;
            btnSave.textContent = 'Salvar';
        }
    }

    async function toggleEnabled(id, newState) {
        try {
            const res = await fetch(API + '/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled: newState })
            });
            if (!res.ok) throw new Error('Failed');
            showAlert(newState ? 'Proxy ativado' : 'Proxy desativado', 'success');
            loadProxies();
        } catch (e) {
            showAlert('Erro ao alterar status', 'error');
        }
    }

    async function deleteProxy(id, proxyId) {
        if (!confirm('Tem certeza que deseja excluir o proxy "' + proxyId + '"?\nEssa ação não pode ser desfeita.')) return;

        try {
            const res = await fetch(API + '/' + id, { method: 'DELETE' });
            if (!res.ok) throw new Error('Failed');
            showAlert('Proxy "' + proxyId + '" excluído', 'success');
            loadProxies();
        } catch (e) {
            showAlert('Erro ao excluir proxy', 'error');
        }
    }

    // Init
    loadProxies();
</script>
</body>
</html>
