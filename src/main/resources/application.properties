# PagBank PIX Donation Configuration
pagbank.url=https://api.pagseguro.com/
pagbank.token=fe5706b4-4425-4c1a-b953-a97985f9a3b1b2d9f649425f9c7fb6f2e80290a4dd835a72-ae69-410f-8fe3-c84070ba3f88
