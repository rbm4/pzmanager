spring.application.name=manager

# Application version (injected from pom.xml at build time)
app.version=@project.version@

# Internationalization Configuration
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Server restart password
server.restart.password=adminrbz0mb01d2$3

# Scheduled automatic restart configuration
server.scheduled.restart.enabled=true
server.scheduled.restart.hour=6
server.scheduled.restart.minute=0
server.scheduled.restart.timezone=America/Sao_Paulo

# Steam API Configuration
steam.api.key=DE9835D751AE7D6FBA285478FFFCAA12
server.base-url=http://localhost:8080

# JPA Configuration (Global)
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.show-sql=false

# Discord webhook configuration
discord.notifications.enabled=true
discord.webhook.url=https://discord.com/api/webhooks/1459544363649466369/NhmXHIYUPevqzJFwi8rvkqFiRfjBKNb-2gHTDTXnLHQbXwTlsV7PMgyqccRMYNALFCNi

# PagBank PIX Donation Configuration
pagbank.url=https://api.pagseguro.com/
pagbank.token=fe5706b4-4425-4c1a-b953-a97985f9a3b1b2d9f649425f9c7fb6f2e80290a4dd835a72-ae69-410f-8fe3-c84070ba3f88
pagbank.email=contato@apocalipse.cloud
pagbank.notification-url=https://apocalipse.cloud/donations/webhook
# Dynamic coin rate: based on item Base.SkillRecoveryBoundJournalFull (R$10 reference)
# Fallback rate if item not found: 15 coins per centavo
# QR Code expiration in minutes
pagbank.qr-expiration-minutes=15
# HikariCP pool size for SQLite (single connection to avoid collisions)
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1

# Disable database/SQL logging
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.springframework.jdbc=OFF
logging.level.org.flywaydb=WARN
logging.level.com.zaxxer.hikari=WARN

# Region area cost factor — multiplied by region area to scale region property costs
# Formula: finalCost = baseTierCost * (1 + area * factor), where area = |x2-x1| * |y2-y1|
game.event.region-area-factor=0.0002

# Soft-Wipe Configuration
# Cost = max(minCost, ceil(area * areaCostFactor)), where area = |x2-x1| * |y2-y1| in tile²
softwipe.area-cost-factor=0.31
softwipe.min-cost=3000
softwipe.enabled=true

# Application logging
logging.level.com.apocalipsebr.zomboid.server.manager.application.service.DonationService=INFO
logging.level.com.apocalipsebr.zomboid.server.manager.application.service.PagBankService=INFO
